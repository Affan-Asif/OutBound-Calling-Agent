<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AIM Voice Agent</title>
  <style>
    :root {
      --bg: #0b0d12;
      --card: #151822;
      --card2: #1d2130;
      --ink: #e6e8ef;
      --muted: #8c93a8;
      --accent: #6ea8ff;
      --ok: #4ade80;
      --warn: #fbbf24;
      --bad: #f87171;
      --line: #252a3a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 32px 20px 64px;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
    header h1 { font-size: 22px; margin: 0; letter-spacing: .2px; }
    header .sub { color: var(--muted); font-size: 13px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
    }
    .card h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin: 0 0 14px;
    }
    .row { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    button {
      background: var(--accent);
      color: #0b1220;
      border: 0;
      border-radius: 10px;
      font-weight: 600;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
    }
    button.ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    button.bad { background: #3a1f23; color: var(--bad); border: 1px solid #4b2b30; }
    button:disabled { opacity: .5; cursor: not-allowed; }

    ul.queue { list-style: none; padding: 0; margin: 14px 0 0; }
    ul.queue li {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-family: ui-monospace, monospace;
    }
    ul.queue li .idx { color: var(--muted); margin-right: 10px; }
    ul.queue li button { background: transparent; color: var(--muted); padding: 4px 8px; }

    .status-box {
      background: var(--card2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      font-family: ui-monospace, monospace;
      min-height: 92px;
    }
    .status-state {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-right: 8px;
    }
    .s-idle         { background: #232838; color: var(--muted); }
    .s-dialing      { background: #3a2f14; color: var(--warn); }
    .s-in_progress  { background: #1f3a2b; color: var(--ok); }
    .s-ended        { background: #262c40; color: var(--accent); }
    .s-failed       { background: #3a1f23; color: var(--bad); }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
    }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .6px; }
    td.phone { font-family: ui-monospace, monospace; }
    .pill {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
    }
    .p-purchased { background: #133622; color: var(--ok); }
    .p-postponed { background: #3a2f14; color: var(--warn); }
    .p-cancelled { background: #3a1f23; color: var(--bad); }
    .p-interested{ background: #1c2d4a; color: var(--accent); }
    .p-undecided { background: #232838; color: var(--muted); }
    .p-no_answer { background: #232838; color: var(--muted); }

    .muted { color: var(--muted); }
    .err { color: var(--bad); font-size: 13px; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>AIM Voice Agent</h1>
        <div class="sub">Enter numbers, start the queue, calls run sequentially.</div>
      </div>
      <div class="sub" id="workerBadge">worker: ?</div>
    </header>

    <div class="grid">
      <section class="card">
        <h2>Queue</h2>
        <div class="row">
          <input id="numInput" type="text" placeholder="+91XXXXXXXXXX" autocomplete="off" />
          <button onclick="addNumber()">Add</button>
        </div>
        <div class="err" id="err"></div>

        <ul class="queue" id="queueList"></ul>

        <div class="row" style="margin-top: 14px;">
          <button onclick="startCalls()" id="startBtn">Start Calling</button>
          <button class="ghost" onclick="clearLocal()">Clear List</button>
          <button class="bad" onclick="stopServer()">Stop Server Queue</button>
        </div>
      </section>

      <section class="card">
        <h2>Now</h2>
        <div class="status-box" id="statusBox">
          <span class="status-state s-idle">idle</span>
          <span class="muted">No active call.</span>
        </div>

        <h2 style="margin-top: 22px;">Pending on Server</h2>
        <ul class="queue" id="serverQueue"><li class="muted">—</li></ul>
      </section>
    </div>

    <section class="card" style="margin-top: 20px;">
      <h2>Recent Calls</h2>
      <table>
        <thead>
          <tr>
            <th>Phone</th>
            <th>Outcome</th>
            <th>Tone</th>
            <th>Interest</th>
            <th>Turns</th>
            <th>Duration</th>
            <th>Notes</th>
            <th>Ended</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="8" class="muted">Loading…</td></tr>
        </tbody>
      </table>
    </section>
  </div>

<script>
  // ---------------- local queue (before sending to server) ----------------
  const local = [];
  const $ = (id) => document.getElementById(id);

  function setError(msg) { $("err").textContent = msg || ""; }

  function normalize(raw) {
    const trimmed = (raw || "").trim();
    if (!trimmed) return "";
    const hasPlus = trimmed.startsWith("+");
    const digits = trimmed.replace(/\D/g, "");
    return hasPlus ? "+" + digits : digits;
  }

  function addNumber() {
    const v = normalize($("numInput").value);
    if (!v) { setError("Enter a number."); return; }
    if (v.replace(/\D/g, "").length < 8) {
      setError("That doesn't look like a valid phone number.");
      return;
    }
    if (local.includes(v)) {
      setError("Already in the list.");
      return;
    }
    setError("");
    local.push(v);
    $("numInput").value = "";
    $("numInput").focus();
    renderLocal();
  }

  function removeNumber(i) { local.splice(i, 1); renderLocal(); }
  function clearLocal()    { local.length = 0; renderLocal(); }

  function renderLocal() {
    const ul = $("queueList");
    ul.innerHTML = "";
    if (!local.length) {
      ul.innerHTML = '<li class="muted">No numbers added yet.</li>';
      return;
    }
    local.forEach((n, i) => {
      const li = document.createElement("li");
      li.innerHTML =
        `<span><span class="idx">${i + 1}.</span>${n}</span>` +
        `<button onclick="removeNumber(${i})" title="Remove">✕</button>`;
      ul.appendChild(li);
    });
  }

  // ---------------- enter starts the flow ----------------
  document.addEventListener("DOMContentLoaded", () => {
    $("numInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") addNumber();
    });
    renderLocal();
    pollStatus();
    pollHistory();
    setInterval(pollStatus, 1500);
    setInterval(pollHistory, 3000);
  });

  // ---------------- actions ----------------
  async function startCalls() {
    if (!local.length) { setError("Add at least one number."); return; }
    setError("");
    $("startBtn").disabled = true;
    try {
      const res = await fetch("/call", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ numbers: local }),
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      if (data.rejected && data.rejected.length) {
        setError("Rejected: " + data.rejected.join(", "));
      }
      local.length = 0;
      renderLocal();
    } catch (e) {
      setError("Failed: " + e.message);
    } finally {
      $("startBtn").disabled = false;
    }
  }

  async function stopServer() {
    if (!confirm("Clear the server's pending queue? (Active call keeps going.)")) return;
    try {
      const res = await fetch("/call/stop", { method: "POST" });
      const data = await res.json();
      setError("Cleared " + (data.cleared || []).length + " pending.");
    } catch (e) { setError("Failed: " + e.message); }
  }

  // ---------------- polling ----------------
  async function pollStatus() {
    try {
      const r = await fetch("/call/status");
      const s = await r.json();

      $("workerBadge").textContent = "worker: " + (s.worker_running ? "running" : "stopped");

      const cur = s.current || {};
      const state = (cur.status || "idle").toLowerCase();
      const box = $("statusBox");
      const stateClass = "s-" + state.replace(/\s+/g, "_");
      let extra = "";
      if (state === "idle") {
        extra = '<span class="muted">No active call.</span>';
      } else {
        extra =
          `<strong>${cur.number || ""}</strong>` +
          (cur.call_sid ? ` <span class="muted">· ${cur.call_sid}</span>` : "") +
          (cur.started_at ? `<br><span class="muted">since ${new Date(cur.started_at).toLocaleTimeString()}</span>` : "");
      }
      box.innerHTML =
        `<span class="status-state ${stateClass}">${state.replace("_", " ")}</span>` + extra;

      const sq = $("serverQueue");
      sq.innerHTML = "";
      if (!s.pending || !s.pending.length) {
        sq.innerHTML = '<li class="muted">Empty.</li>';
      } else {
        s.pending.forEach((n, i) => {
          const li = document.createElement("li");
          li.innerHTML = `<span><span class="idx">${i + 1}.</span>${n}</span>`;
          sq.appendChild(li);
        });
      }
    } catch (e) {
      $("workerBadge").textContent = "worker: unreachable";
    }
  }

  async function pollHistory() {
    try {
      const r = await fetch("/calls?limit=30");
      const rows = await r.json();
      const tb = $("historyBody");
      tb.innerHTML = "";
      if (!rows.length) {
        tb.innerHTML = '<tr><td colspan="8" class="muted">No calls yet.</td></tr>';
        return;
      }
      for (const row of rows) {
        const tr = document.createElement("tr");
        const ended = row.ended_at ? new Date(row.ended_at).toLocaleString() : "—";
        const interest = row.interest_score == null ? "—" : Number(row.interest_score).toFixed(2);
        const dur = row.duration_sec == null ? "—" : Number(row.duration_sec).toFixed(1) + "s";
        tr.innerHTML =
          `<td class="phone">${escape(row.phone)}</td>` +
          `<td><span class="pill p-${row.outcome}">${row.outcome}</span></td>` +
          `<td>${escape(row.final_tone || "")}</td>` +
          `<td>${interest}</td>` +
          `<td>${row.turns ?? 0}</td>` +
          `<td>${dur}</td>` +
          `<td class="muted">${escape(row.notes || "")}</td>` +
          `<td class="muted">${ended}</td>`;
        tb.appendChild(tr);
      }
    } catch {
      /* ignore */
    }
  }

  function escape(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
</script>
</body>
</html>
